<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Trip Planner</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <!-- Marked.js for Markdown parsing -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>
    <div class="background-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

    <div class="container">
        <header>
            <h1>AI Trip Planner</h1>
            <p>Tell us where you want to go, your budget, and timeframe.</p>
        </header>

        <div class="card glassmorphism">
            <div class="input-group">
                <label for="prompt">Your Trip Details</label>
                <textarea id="prompt" placeholder="e.g., 4 day trip to Malaysia with a budget of $400, give me a day by day breakdown?"></textarea>
            </div>
            <button id="planBtn" class="primary-btn">
                <span class="btn-text">Plan My Trip</span>
                <span class="btn-spinner hidden"></span>
            </button>
        </div>

        <div id="resultCard" class="card glassmorphism result-card hidden">
            <div class="result-header">
                <h2>Your Itinerary</h2>
                <div class="action-buttons">
                    <button id="copyBtn" class="icon-btn" title="Copy to Clipboard">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
                    </button>
                </div>
            </div>
            <div id="resultContent" class="markdown-body">
                <!-- Result will be inserted here -->
            </div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
